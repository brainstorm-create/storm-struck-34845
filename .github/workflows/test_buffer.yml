name: Test - Sliding Buffer FINAL
on: workflow_dispatch

jobs:
  test-buffer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update -qq > /dev/null 2>&1
          sudo apt-get install -y ffmpeg curl > /dev/null 2>&1
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp > /dev/null 2>&1
          sudo chmod a+rx /usr/local/bin/yt-dlp > /dev/null 2>&1
          
      - name: Install Warp
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg > /dev/null 2>&1
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list > /dev/null 2>&1
          sudo apt-get update && sudo apt-get install cloudflare-warp -y > /dev/null 2>&1
          
      - name: Setup Deno (yt-dlp helper)
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Run Warp & Test
        run: |
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          
          echo "🔍 Localizando test_buffer.js..."
          SCRIPT_PATH=$(find . -name "test_buffer.js" | head -n 1)
          
          if [ -n "$SCRIPT_PATH" ]; then
            echo "✅ Encontrado em: $SCRIPT_PATH"
            timeout 5m node "$SCRIPT_PATH" || echo "Processo encerrado."
          else
            echo "❌ ERRO: test_buffer.js não encontrado!"
            echo "Estrutura do repositório:"
            ls -R
            exit 1
          fi
