name: start-stream

on:
  repository_dispatch:
    types: [start-stream]

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Mask Secrets
        run: |
          echo "::add-mask::${{ github.event.client_payload.session_token }}"
          echo "::add-mask::${{ github.event.client_payload.brain_url }}"
          echo "::add-mask::${{ github.event.client_payload.session_id }}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      # ── Bootstrap ─────────────────────────────────────────────────────────────
      # Deve rodar ANTES dos caches para que o hashFiles('setup.sh') funcione.
      # Baixa runner.zip + setup.sh do brain.

      - name: Bootstrap
        env:
          SESSION_ID: ${{ github.event.client_payload.session_id }}
          SESSION_TOKEN: ${{ github.event.client_payload.session_token }}
          BRAIN_URL: ${{ github.event.client_payload.brain_url }}
        run: |
          if [ -n "$SESSION_TOKEN" ]; then echo "::add-mask::$SESSION_TOKEN"; fi
          if [ -n "$BRAIN_URL" ]; then echo "::add-mask::$BRAIN_URL"; fi
          curl -L \
            -H "Authorization: Bearer $SESSION_TOKEN" \
            "$BRAIN_URL/internal/session/$SESSION_ID/bootstrap" \
            -o runner.zip ##> /dev/null 2>&1
          unzip runner.zip ##> /dev/null 2>&1 || [ $? -eq 1 ]
          echo "✅ Bootstrap concluído"

      # ── Caches ────────────────────────────────────────────────────────────────
      # Chave baseada no hash do setup.sh — invalida automaticamente quando muda.

      - name: Cache - apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('setup.sh') }}

      - name: Cache - node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('setup.sh') }}

      - name: Cache - Chrome (Puppeteer)
        id: cache-puppeteer
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('setup.sh') }}

      - name: Cache - Deno
        id: cache-deno
        uses: actions/cache@v4
        with:
          path: ~/.deno
          key: deno-${{ runner.os }}-${{ hashFiles('setup.sh') }}

      # ── Setup ─────────────────────────────────────────────────────────────────
      # O setup.sh recebe os resultados de cache via env
      # e decide sozinho o que instalar ou pular.

      - name: Setup
        env:
          CACHE_NODE_MODULES: ${{ steps.cache-node-modules.outputs.cache-hit }}
          CACHE_PUPPETEER: ${{ steps.cache-puppeteer.outputs.cache-hit }}
          CACHE_DENO: ${{ steps.cache-deno.outputs.cache-hit }}
        run: bash setup.sh #> /dev/null 2>&1

      # ── Run ───────────────────────────────────────────────────────────────────

      - name: Run
        env:
          SESSION_ID: ${{ github.event.client_payload.session_id }}
          SESSION_TOKEN: ${{ github.event.client_payload.session_token }}
          BRAIN_URL: ${{ github.event.client_payload.brain_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [ -n "$SESSION_TOKEN" ]; then echo "::add-mask::$SESSION_TOKEN"; fi
          if [ -n "$BRAIN_URL" ]; then echo "::add-mask::$BRAIN_URL"; fi
          node main.js #> /dev/null 2>&1