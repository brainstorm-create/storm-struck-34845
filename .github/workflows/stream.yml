name: start-stream

on:
  repository_dispatch:
    types: [start-stream]

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Mask Secrets
        run: |
          echo "::add-mask::${{ github.event.client_payload.session_token }}"
          echo "::add-mask::${{ github.event.client_payload.brain_url }}"
          echo "::add-mask::${{ github.event.client_payload.session_id }}"

      - name: Notify Brain - Action Started
        env:
          SESSION_ID: ${{ github.event.client_payload.session_id }}
          SESSION_TOKEN: ${{ github.event.client_payload.session_token }}
          BRAIN_URL: ${{ github.event.client_payload.brain_url }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $SESSION_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"github_run_id\":\"${{ github.run_id }}\",\"github_run_number\":${{ github.run_number }}}" \
            "$BRAIN_URL/internal/session/$SESSION_ID/action-started" || true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      # ── Cache da imagem Docker ──────────────────────────────────────────────

      - name: Cache - Docker image
        id: cache-docker
        uses: actions/cache@v4
        with:
          path: /tmp/docker-image.tar
          key: docker-livequeue-runner-${{ hashFiles('runner/runner/container/Dockerfile', 'runner/runner/container/package-lock.json') }}

      - name: Load Docker image from cache
        if: steps.cache-docker.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-image.tar

      # ── Bootstrap & Run ────────────────────────────────────────────────────

      - name: Bootstrap & Run
        env:
          SESSION_ID: ${{ github.event.client_payload.session_id }}
          SESSION_TOKEN: ${{ github.event.client_payload.session_token }}
          BRAIN_URL: ${{ github.event.client_payload.brain_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          # 1. Download do runner.zip (contém console/ + container/ + bootstrap.sh)
          curl -sL \
            -H "Authorization: Bearer $SESSION_TOKEN" \
            "$BRAIN_URL/internal/session/$SESSION_ID/bootstrap" \
            -o runner.zip
          unzip -o runner.zip > /dev/null 2>&1 || [ $? -eq 1 ]

          # 2. Bootstrap: sobe console no host + runner em Docker
          chmod +x bootstrap.sh
          bash bootstrap.sh

      # ── Salvar imagem Docker no cache (pós-run) ─────────────────────────────

      - name: Save Docker image to cache
        if: always() && steps.cache-docker.outputs.cache-hit != 'true'
        run: |
          if docker image inspect livequeue-runner > /dev/null 2>&1; then
            docker save livequeue-runner -o /tmp/docker-image.tar
          fi
