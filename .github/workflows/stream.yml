name: start-stream

on:
  repository_dispatch:
    types: [start-stream]

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Mask Secrets
        run: |
          echo "::add-mask::${{ github.event.client_payload.session_token }}"
          echo "::add-mask::${{ github.event.client_payload.brain_url }}"
          echo "::add-mask::${{ github.event.client_payload.session_id }}"

      - name: Notify Brain - Action Started
        env:
          SESSION_ID: ${{ github.event.client_payload.session_id }}
          SESSION_TOKEN: ${{ github.event.client_payload.session_token }}
          BRAIN_URL: ${{ github.event.client_payload.brain_url }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $SESSION_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"github_run_id\":\"${{ github.run_id }}\",\"github_run_number\":${{ github.run_number }}}" \
            "$BRAIN_URL/internal/session/$SESSION_ID/action-started" || true
          echo "✅ Brain notificado (run_id: ${{ github.run_id }}, run_number: ${{ github.run_number }})"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      # ── Caches ────────────────────────────────────────────────────────────────

      # Chrome: chave manual — incrementa quando atualizar puppeteer no package.json
      - name: Cache - Chrome (Puppeteer)
        id: cache-puppeteer
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-chrome-${{ runner.os }}-v1

      - name: Cache - Deno
        id: cache-deno
        uses: actions/cache@v4
        with:
          path: ~/.deno
          key: deno-${{ runner.os }}-v1

      # node_modules: maior ganho — evita recompilar node-canvas nativo (2-5 min)
      # Chave manual — incrementa quando mudar dependências no package.json
      - name: Cache - node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-v1

      # apt: cacheia os .deb baixados — apt-get install usa os arquivos locais
      # economiza ~1 min de download. Instalação ainda roda, mas é mais rápida.
      - name: Cache - apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-packages-${{ runner.os }}-v1

      # ── Bootstrap ─────────────────────────────────────────────────────────────

      - name: Bootstrap
        env:
          SESSION_ID: ${{ github.event.client_payload.session_id }}
          SESSION_TOKEN: ${{ github.event.client_payload.session_token }}
          BRAIN_URL: ${{ github.event.client_payload.brain_url }}
        run: |
          if [ -n "$SESSION_TOKEN" ]; then echo "::add-mask::$SESSION_TOKEN"; fi
          if [ -n "$BRAIN_URL" ]; then echo "::add-mask::$BRAIN_URL"; fi
          curl -L \
            -H "Authorization: Bearer $SESSION_TOKEN" \
            "$BRAIN_URL/internal/session/$SESSION_ID/bootstrap" \
            -o runner.zip > /dev/null 2>&1
          unzip runner.zip > /dev/null 2>&1 || [ $? -eq 1 ]
          echo "✅ Bootstrap concluído"

      # ── Instalações ───────────────────────────────────────────────────────────

      # Sempre roda — runner é sempre limpo. Com cache, apt usa .deb locais (mais rápido).
      - name: Install - System (FFmpeg, Xvfb, Chrome/Canvas libs)
        run: |
          sudo apt-get update -qq > /dev/null 2>&1
          sudo apt-get install -y \
            ffmpeg xvfb \
            curl ca-certificates fonts-liberation libgbm1 libnss3 \
            libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxcomposite1 \
            libxdamage1 libxrandr2 libxss1 libxshmfence1 libxkbcommon0 \
            libasound2t64 libpangocairo-1.0-0 libcairo2 libpango-1.0-0 \
            libgtk-3-0 libdbus-1-3 libexpat1 libx11-6 libx11-xcb1 libxcb1 \
            libxext6 libxfixes3 libxi6 libxrender1 libxtst6 wget \
            dnsutils build-essential python3 pkg-config \
            libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev > /dev/null 2>&1
          echo "✅ System deps instalados"

      # Sempre atualiza — garante última versão (necessário para YouTube)
      - name: Install - yt-dlp
        run: |
          sudo curl -fsSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o /usr/local/bin/yt-dlp > /dev/null 2>&1
          sudo chmod a+rx /usr/local/bin/yt-dlp > /dev/null 2>&1
          sudo yt-dlp -U > /dev/null 2>&1
          echo "✅ yt-dlp $(yt-dlp --version)"

      - name: Install - Deno
        run: |
          if [ ! -d "$HOME/.deno/bin" ]; then
            curl -fsSL https://deno.land/install.sh | sh > /dev/null 2>&1
          else
            echo "Deno - Ready!"
          fi
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          echo "✅ Deno pronto"

      # WARP sempre instala e registra — identidade nova a cada job
      - name: Install - Cloudflare WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg > /dev/null 2>&1
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list > /dev/null 2>&1
          sudo apt-get update -qq > /dev/null 2>&1
          sudo apt-get install -y cloudflare-warp > /dev/null 2>&1
          sudo warp-cli --accept-tos registration new || true
          sudo warp-cli --accept-tos mode warp
          sudo warp-cli --accept-tos connect
          echo "✅ WARP conectado"

      # Pulado quando cache hit — evita recompilação do node-canvas (maior ganho)
      - name: Install - npm deps
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
        run: |
          npm install --omit=dev > /dev/null 2>&1
          echo "✅ npm deps instalados"

      - name: Install - Chrome
        if: steps.cache-puppeteer.outputs.cache-hit != 'true'
        run: |
          npx puppeteer browsers install chrome > /dev/null 2>&1
          echo "✅ Chrome instalado"

      # ── Run ───────────────────────────────────────────────────────────────────

      - name: Run
        env:
          SESSION_ID: ${{ github.event.client_payload.session_id }}
          SESSION_TOKEN: ${{ github.event.client_payload.session_token }}
          BRAIN_URL: ${{ github.event.client_payload.brain_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [ -n "$SESSION_TOKEN" ]; then echo "::add-mask::$SESSION_TOKEN"; fi
          if [ -n "$BRAIN_URL" ]; then echo "::add-mask::$BRAIN_URL"; fi
          node main.js
