name: Network Speed Test (Official Speedtest CLI)
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install Cloudflare Warp & Speedtest CLI
        run: |
          # 1. Setup Cloudflare Warp
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ jammy main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          
          # 2. Setup Ookla Speedtest
          curl -s https://packagecloud.io/install/repositories/ookla/speedtest-cli/script.deb.sh | sudo bash
          
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp speedtest

      - name: Start Warp Service
        run: |
          # Inicia o serviço em background
          sudo nohup warp-svc > /dev/null 2>&1 &
          sleep 5
          
          # Registro e Conexão
          sudo warp-cli --accept-tos registration new
          sudo warp-cli --accept-tos mode warp
          sudo warp-cli --accept-tos connect
          
          echo "Aguardando conexão do Warp..."
          for i in {1..15}; do
            if sudo warp-cli --accept-tos status | grep -q "Connected"; then
              echo "✅ Warp ON!"
              break
            fi
            sleep 2
          done

      - name: Run Official Speedtest
        run: |
          echo "--- INFO DA CONEXÃO ATUAL ---"
          curl -s https://ifconfig.me/all
          echo -e "\n----------------------------"
          
          # Roda o speedtest aceitando os termos automaticamente
          # O parâmetro --format=interactive mostra o progresso no log
          speedtest --accept-license --accept-gdpr
