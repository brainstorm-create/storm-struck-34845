name: Network Speed Test (Native)
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install Cloudflare Warp
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ jammy main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          
      - name: Configure Warp
        run: |
          sudo systemctl start warp-svc || true
          sleep 2
          sudo warp-cli --accept-tos registration new
          sudo warp-cli --accept-tos mode warp
          sudo warp-cli --accept-tos connect
          echo "Aguardando Warp conectar..."
          for i in {1..15}; do
            STATUS=$(sudo warp-cli --accept-tos status)
            echo "$STATUS"
            if echo "$STATUS" | grep -q "Connected"; then
              echo "✅ Warp conectado!"
              break
            fi
            sleep 2
          done
          
      - name: Measure Download (With Warp)
        run: |
          echo "--- DOWNLOAD TEST COM WARP ---"
          # Cloudflare's own speedtest endpoint (Best for Warp)
          curl -Lk -o /dev/null -w "Velocidade: %{speed_download} bytes/sec\nTempo: %{time_total}s\n" https://speed.cloudflare.com/__down?bytes=100000000
          
      - name: Disconnect Warp
        run: |
          sudo warp-cli --accept-tos disconnect || true
          sleep 2
          
      - name: Measure Download (Without Warp)
        run: |
          echo "--- DOWNLOAD TEST SEM WARP ---"
          curl -Lk -o /dev/null -w "Velocidade: %{speed_download} bytes/sec\nTempo: %{time_total}s\n" https://speed.cloudflare.com/__down?bytes=100000000
