name: Network Speed Test (Node Engine)
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install Cloudflare Warp
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ jammy main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          
      - name: Configure Warp
        run: |
          sudo systemctl start warp-svc || true
          sleep 2
          sudo warp-cli --accept-tos registration new
          sudo warp-cli --accept-tos mode warp
          sudo warp-cli --accept-tos connect
          echo "Aguardando Warp conectar..."
          for i in {1..15}; do
            STATUS=$(sudo warp-cli --accept-tos status)
            echo "$STATUS"
            if echo "$STATUS" | grep -q "Connected"; then
              echo "✅ Warp conectado!"
              break
            fi
            sleep 2
          done
          
      - name: Measure Download (Node.js Script)
        run: |
          echo "--- SPEEDTEST VIA NODE.JS ---"
          node -e '
          const http = require("http");
          const https = require("https");
          const url = "https://speed.hetzner.de/100MB.bin";
          
          console.log("Iniciando download de teste (100MB)...");
          const start = Date.now();
          let received = 0;
          
          const client = url.startsWith("https") ? https : http;
          const options = { 
            headers: { "User-Agent": "Mozilla/5.0" },
            rejectUnauthorized: false // Ignora erro de certificado expirado
          };
          
          client.get(url, options, (res) => {
            if (res.statusCode >= 300 && res.statusCode < 400 && res.headers.location) {
              console.log("Redirecionando para:", res.headers.location);
              // Simplificado: não segue o redirect no -e mas avisa
              return;
            }
            res.on("data", (chunk) => { received += chunk.length; });
            res.on("end", () => {
              const dur = (Date.now() - start) / 1000;
              const mbps = ((received * 8) / (1024 * 1024)) / dur;
              const mbs = (received / (1024 * 1024)) / dur;
              console.log(`\n--- RESULTADO ---`);
              console.log(`Total baixado: ${(received / (1024 * 1024)).toFixed(2)} MB`);
              console.log(`Tempo: ${dur.toFixed(2)}s`);
              console.log(`Velocidade: ${mbs.toFixed(2)} MB/s (${mbps.toFixed(2)} Mbps)`);
              process.exit(0);
            });
          }).on("error", (e) => {
            console.error("Erro no download:", e.message);
            process.exit(1);
          });
          '
